<style>
:root{--bg-primary:#FAFAF8;--bg-secondary:#FFFFFF;--bg-card:#FFFFFF;--bg-input:#F5F5F0;--text-primary:#2D2D2D;--text-secondary:#6B6B6B;--text-muted:#9B9B9B;--border:#E8E8E4;--border-focus:#7BA68C;--shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.08);--accent-feeding:#E8945A;--accent-diaper:#6BA3D6;--accent-pumping:#D4A0D9;--accent-sleep:#7B8EC4;--accent-growth:#6BBF8A;--accent-milestone:#E8C84A;--accent-health:#E07070;--accent-activity:#5BBFB5;--accent-primary:#7BA68C;--radius:16px;--radius-sm:10px;--nav-height:72px}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{font-size:16px;height:100%}body{font-family:'Nunito',sans-serif;background:var(--bg-primary);color:var(--text-primary);-webkit-font-smoothing:antialiased;min-height:100%;overflow-x:hidden;padding-top:env(safe-area-inset-top)}

.header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:var(--bg-primary)}.h-left{display:flex;align-items:center;gap:10px}.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent-primary),var(--accent-sleep));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(123,166,140,0.3);color:white;font-weight:800;font-family:'Quicksand',sans-serif}.h-name{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.15rem}.h-age{font-size:0.72rem;color:var(--text-muted);font-weight:600}.h-actions{display:flex;gap:6px}.ibtn{width:38px;height:38px;border-radius:50%;border:none;background:var(--bg-card);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:var(--shadow)}.ibtn:active{transform:scale(0.9)}
.sync-bar{padding:5px 16px;font-size:0.65rem;font-weight:700;text-align:center;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:5px}.sdot{width:6px;height:6px;border-radius:50%}.sdot.ok{background:#6BBF8A}.sdot.local{background:var(--accent-milestone)}.sdot.err{background:var(--accent-health)}.sdot.sync{background:var(--accent-sleep);animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-height);background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 6px;padding-bottom:env(safe-area-inset-bottom,6px);z-index:200}.nitem{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 10px;border:none;background:none;color:var(--text-muted);font-size:20px;cursor:pointer;font-family:'Nunito',sans-serif}.nitem span{font-size:0.58rem;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}.nitem.act{color:var(--accent-primary)}.nadd{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent-primary),#6BBFA0);color:white;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(123,166,140,0.4);display:flex;align-items:center;justify-content:center;transform:translateY(-10px)}.nadd:active{transform:translateY(-10px) scale(0.9)}
.stitle{font-family:'Quicksand',sans-serif;font-weight:700;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);padding:14px 16px 6px}.card{background:var(--bg-card);border-radius:var(--radius);margin:5px 14px;padding:12px 14px;box-shadow:var(--shadow);border:1px solid var(--border)}.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 14px;margin-bottom:10px}.scard{background:var(--bg-card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}.sval{font-family:'Quicksand',sans-serif;font-size:1.6rem;font-weight:800}.slab{font-size:0.65rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-top:2px}
.chips{display:flex;gap:6px;padding:4px 14px 8px;overflow-x:auto;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{flex-shrink:0;padding:6px 12px;border-radius:18px;font-size:0.72rem;font-weight:700;display:flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--bg-card);white-space:nowrap}
.erow{display:flex;align-items:center;gap:10px}.eicon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.einfo{flex:1;min-width:0}.etitle{font-weight:700;font-size:0.85rem}.esub{font-size:0.72rem;color:var(--text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.etime{text-align:right;flex-shrink:0}.etime-m{font-size:0.75rem;font-weight:700}.etime-r{font-size:0.62rem;color:var(--text-muted)}.edel{width:26px;height:26px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0.4;flex-shrink:0}.edel:active{opacity:1;color:var(--accent-health)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.15s ease}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.sheet{background:var(--bg-secondary);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:6px 18px 28px;animation:slideUp 0.25s ease}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 14px}.mtitle{font-family:'Quicksand',sans-serif;font-weight:800;font-size:1.2rem;text-align:center;margin-bottom:16px}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}.tbtn{padding:12px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:600;color:var(--text-primary)}.tbtn.sel{border-color:var(--accent-primary);background:rgba(123,166,140,0.08)}.tbtn:active{transform:scale(0.96)}.tbtn .ti{font-size:1.2rem}
.fgroup{margin-bottom:12px}.flabel{font-size:0.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;display:block}.finput{width:100%;padding:11px 12px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--bg-input);color:var(--text-primary);font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:600;outline:none}.finput:focus{border-color:var(--border-focus)}textarea.finput{resize:vertical;min-height:50px}
.btn1{width:100%;padding:14px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--accent-primary),#6BBFA0);color:white;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(123,166,140,0.3)}.btn1:active{transform:scale(0.97)}.btn1:disabled{opacity:0.5}.btn2{width:100%;padding:12px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:8px}.btn-danger{width:100%;padding:12px;border-radius:var(--radius);border:2px solid var(--accent-health);background:transparent;color:var(--accent-health);font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:8px}
.timer-box{text-align:center;padding:16px;margin:10px 0;background:var(--bg-input);border-radius:var(--radius)}.timer-val{font-family:'Quicksand',sans-serif;font-size:2.8rem;font-weight:800;color:var(--accent-primary);letter-spacing:2px}.timer-lab{font-size:0.7rem;color:var(--text-muted);font-weight:600;margin-top:3px}.timer-ctrls{display:flex;gap:8px;margin-top:10px}.tbtn2{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}.tbtn2.start{background:var(--accent-primary);color:white}.tbtn2.stop{background:var(--accent-health);color:white}.tbtn2.reset{background:var(--bg-input);color:var(--text-secondary);border:2px solid var(--border)}
.ctabs{display:flex;gap:5px;padding:0 14px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px}.ctabs::-webkit-scrollbar{display:none}.ctab{flex-shrink:0;padding:6px 12px;border-radius:18px;border:2px solid var(--border);background:var(--bg-card);font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--text-secondary);white-space:nowrap}.ctab.act{border-color:var(--accent-primary);color:var(--accent-primary);background:rgba(123,166,140,0.08)}
.daysep{padding:10px 16px 3px;font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px}.empty{text-align:center;padding:36px 18px;color:var(--text-muted)}.empty .ei{font-size:2.5rem;margin-bottom:10px}.empty .et{font-size:0.85rem;font-weight:600}
.setup{padding:36px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center}.setup-logo{font-size:3.5rem;margin-bottom:14px}.setup-title{font-family:'Quicksand',sans-serif;font-weight:800;font-size:1.6rem;text-align:center;margin-bottom:3px}.setup-sub{color:var(--text-secondary);text-align:center;margin-bottom:28px;font-size:0.85rem;line-height:1.5;max-width:320px}.setup-form{width:100%;max-width:340px}.step{margin-bottom:20px}.step-num{display:inline-flex;width:26px;height:26px;border-radius:50%;background:var(--accent-primary);color:white;font-size:0.75rem;font-weight:800;align-items:center;justify-content:center;margin-right:6px}.step-title{font-weight:700;font-size:0.9rem;margin-bottom:8px}.step-help{font-size:0.68rem;color:var(--text-muted);margin-top:5px;line-height:1.5}.step-help a{color:var(--accent-primary)}
.csec{margin:10px 14px;padding:14px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}.csec-title{font-weight:700;font-size:0.85rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}.csec-val{font-size:0.75rem;color:var(--text-secondary);word-break:break-all;background:var(--bg-input);padding:7px 10px;border-radius:6px;margin-bottom:7px}
.dbreak{display:flex;justify-content:space-around;text-align:center}.dbreak-item .di{font-size:1.3rem}.dbreak-item .dv{font-weight:800;font-size:1.1rem}.dbreak-item .dl{font-size:0.65rem;color:var(--text-muted)}.bars{display:flex;align-items:flex-end;justify-content:space-around;height:90px;padding-top:10px}.bar-col{text-align:center;flex:1}.bar-rect{width:20px;border-radius:5px;margin:0 auto 3px;transition:height 0.3s}.bar-lbl{font-size:0.62rem;font-weight:700;color:var(--text-muted)}.bar-val{font-size:0.62rem;font-weight:800}
.status-msg{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--text-primary);padding:10px 20px;border-radius:20px;box-shadow:var(--shadow-lg);font-size:0.8rem;font-weight:700;z-index:600;animation:fadeIn 0.2s ease}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LS={get(k){try{return JSON.parse(localStorage.getItem('bt_'+k))}catch{return null}},set(k,v){localStorage.setItem('bt_'+k,JSON.stringify(v))}};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const CATS={feeding:{icon:'🍼',label:'Alimentación',color:'var(--accent-feeding)',subs:[{id:'breast_left',label:'Pecho Izq.',icon:'🤱'},{id:'breast_right',label:'Pecho Der.',icon:'🤱'},{id:'bottle',label:'Biberón',icon:'🍼'},{id:'solids',label:'Sólidos',icon:'🥣'}]},diaper:{icon:'🧷',label:'Pañal',color:'var(--accent-diaper)',subs:[{id:'wet',label:'Pipí',icon:'💧'},{id:'dirty',label:'Popó',icon:'💩'},{id:'mixed',label:'Ambos',icon:'💧💩'},{id:'dry',label:'Seco',icon:'✨'}]},pumping:{icon:'🫙',label:'Extracción',color:'var(--accent-pumping)',subs:[{id:'pump_left',label:'Izquierdo',icon:'⬅️'},{id:'pump_right',label:'Derecho',icon:'➡️'},{id:'pump_both',label:'Ambos',icon:'↔️'}]},sleep:{icon:'😴',label:'Sueño',color:'var(--accent-sleep)',subs:[{id:'nap',label:'Siesta',icon:'💤'},{id:'night',label:'Noche',icon:'🌙'}]},growth:{icon:'📏',label:'Crecimiento',color:'var(--accent-growth)',subs:[{id:'weight',label:'Peso (kg)',icon:'⚖️'},{id:'height',label:'Talla (cm)',icon:'📏'},{id:'head',label:'Cabeza (cm)',icon:'🟠'}]},milestone:{icon:'⭐',label:'Hitos',color:'var(--accent-milestone)',subs:[]},health:{icon:'🌡️',label:'Salud',color:'var(--accent-health)',subs:[{id:'temperature',label:'Temperatura',icon:'🌡️'},{id:'medication',label:'Medicamento',icon:'💊'},{id:'symptom',label:'Síntoma',icon:'🤒'}]},activity:{icon:'🎯',label:'Actividades',color:'var(--accent-activity)',subs:[{id:'tummy_time',label:'Boca abajo',icon:'👶'},{id:'bath',label:'Baño',icon:'🛁'},{id:'play',label:'Juego',icon:'🧸'}]}};
const fmtTime=d=>new Date(d).toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',hour12:true});
const fmtDate=d=>new Date(d).toLocaleDateString('es-CR',{weekday:'short',day:'numeric',month:'short'});
const fmtDur=m=>{if(!m&&m!==0)return'';const h=Math.floor(m/60),mn=Math.round(m%60);return h>0?h+'h '+mn+'m':mn+'m'};
const fmtRel=d=>{const diff=Date.now()-new Date(d).getTime(),mins=Math.floor(diff/60000);if(mins<1)return'justo ahora';if(mins<60)return'hace '+mins+'m';const hrs=Math.floor(mins/60);if(hrs<24)return'hace '+hrs+'h '+(mins%60)+'m';return fmtDate(d)+' '+fmtTime(d)};
const fmtTimer=s=>{const m=Math.floor(s/60).toString().padStart(2,'0'),ss=(s%60).toString().padStart(2,'0');return m+':'+ss};
const babyAge=bd=>{if(!bd)return'';const days=Math.floor((Date.now()-new Date(bd).getTime())/86400000);if(days<7)return days+' día'+(days!==1?'s':'');if(days<30){const w=Math.floor(days/7);return w+' semana'+(w!==1?'s':'')}const mo=Math.floor(days/30.44);if(mo<12)return mo+' mes'+(mo!==1?'es':'');const y=Math.floor(mo/12),rm=mo%12;return y+' año'+(y!==1?'s':'')+(rm>0?' '+rm+'m':'')};

const GS={apiKey:null,sheetId:null,configured(){return this.apiKey&&this.sheetId},load(){const c=LS.get('sheets_config');if(c){this.apiKey=c.apiKey;this.sheetId=c.sheetId}},save(){LS.set('sheets_config',{apiKey:this.apiKey,sheetId:this.sheetId})},
async readAll(){if(!this.configured())return null;try{const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+this.sheetId+'/values/Registros!A:J?key='+this.apiKey);const data=await r.json();if(data.error){console.error('Read:',data.error.message);return null}if(!data.values||data.values.length<=1)return[];const headers=data.values[0];return data.values.slice(1).map(row=>{const obj={};headers.forEach((h,i)=>obj[h]=row[i]||'');if(obj.duration)obj.duration=parseFloat(obj.duration);return obj}).filter(e=>e.id)}catch(e){console.error('Read:',e);return null}},
async appendRow(entry){if(!this.configured())return false;try{const row=[entry.id,entry.category,entry.subtype||'',entry.timestamp,entry.duration||'',entry.amount||'',entry.unit||'',entry.value||'',entry.notes||'',entry.created_by||''];const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+this.sheetId+'/values/Registros!A:J:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS&key='+this.apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[row]})});const data=await r.json();if(data.error){console.error('Append:',data.error.message);return false}return true}catch(e){console.error('Append:',e);return false}}};

let S={baby:null,entries:[],pendingIds:[],tab:'home',modal:null,addCat:null,filterCat:'all',syncStatus:'local',lastSync:null,timerRunning:false,timerStart:null,timerElapsed:0,deleted:[],statusMsg:null,caregiver:'',selectedSubtype:null};
let timerInterval=null;

function init(){GS.load();S.baby=LS.get('baby');S.entries=LS.get('entries')||[];S.deleted=LS.get('deleted')||[];S.caregiver=LS.get('caregiver')||'';S.pendingIds=LS.get('pendingIds')||[];if(!S.baby)S.modal='setup';else if(GS.configured()){S.syncStatus='ok';syncFromSheets()}render()}
function showStatus(msg){S.statusMsg=msg;render();setTimeout(()=>{S.statusMsg=null;render()},2500)}

async function syncFromSheets(){if(!GS.configured())return;S.syncStatus='sync';render();
// Push pending
if(S.pendingIds.length>0){const pending=S.entries.filter(e=>S.pendingIds.includes(e.id));for(const entry of pending){const ok=await GS.appendRow(entry);if(ok)S.pendingIds=S.pendingIds.filter(id=>id!==entry.id)}LS.set('pendingIds',S.pendingIds)}
// Pull remote
const remote=await GS.readAll();if(remote===null){S.syncStatus='err';render();return}
// Merge: use remote as truth, add local pending
const remoteIds=new Set(remote.map(e=>e.id));const stillPending=S.entries.filter(e=>S.pendingIds.includes(e.id)&&!remoteIds.has(e.id));
const merged=[...remote,...stillPending].filter(e=>!S.deleted.includes(e.id));
merged.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
S.entries=merged;LS.set('entries',S.entries);S.syncStatus='ok';S.lastSync=new Date();render()}

function addEntry(entry){entry.id=uid();entry.timestamp=entry.timestamp||new Date().toISOString();entry.created_by=S.caregiver;
S.entries.unshift(entry);LS.set('entries',S.entries);
if(GS.configured()){S.pendingIds.push(entry.id);LS.set('pendingIds',S.pendingIds);GS.appendRow(entry).then(ok=>{if(ok){S.pendingIds=S.pendingIds.filter(id=>id!==entry.id);LS.set('pendingIds',S.pendingIds)}})}
S.modal=null;S.addCat=null;S.selectedSubtype=null;showStatus('✓ Registro guardado')}

function deleteEntry(id){S.entries=S.entries.filter(e=>e.id!==id);S.deleted.push(id);LS.set('entries',S.entries);LS.set('deleted',S.deleted);render()}

setInterval(()=>{if(GS.configured()&&!S.modal)syncFromSheets()},30000);

function startTimer(){S.timerRunning=true;S.timerStart=Date.now();S.timerElapsed=0;timerInterval=setInterval(()=>{S.timerElapsed=Math.floor((Date.now()-S.timerStart)/1000);const el=document.getElementById('timer-val');if(el)el.textContent=fmtTimer(S.timerElapsed)},1000)}
function pauseTimer(){S.timerRunning=false;clearInterval(timerInterval)}
function resetTimer(){S.timerRunning=false;clearInterval(timerInterval);S.timerStart=null;S.timerElapsed=0}
function resumeTimer(){S.timerRunning=true;S.timerStart=Date.now()-S.timerElapsed*1000;timerInterval=setInterval(()=>{S.timerElapsed=Math.floor((Date.now()-S.timerStart)/1000);const el=document.getElementById('timer-val');if(el)el.textContent=fmtTimer(S.timerElapsed)},1000)}

function h(tag,attrs,...children){const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='onclick'||k==='onchange'||k==='oninput')el[k]=v;else if(k==='className')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else el.setAttribute(k,v)});children.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c)});return el}

function render(){const app=document.getElementById('app');app.innerHTML='';
if(S.statusMsg)app.appendChild(h('div',{className:'status-msg'},S.statusMsg));
if(S.modal==='setup'){app.appendChild(renderSetup());return}
