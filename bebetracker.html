<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BebéTracker">
<meta name="theme-color" content="#7BA68C" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1A1E" media="(prefers-color-scheme: dark)">
<title>BebéTracker</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%237BA68C' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>👶</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #FAFAF8;
  --bg-secondary: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-input: #F5F5F0;
  --text-primary: #2D2D2D;
  --text-secondary: #6B6B6B;
  --text-muted: #9B9B9B;
  --border: #E8E8E4;
  --border-focus: #7BA68C;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --accent-feeding: #E8945A;
  --accent-diaper: #6BA3D6;
  --accent-pumping: #D4A0D9;
  --accent-sleep: #7B8EC4;
  --accent-growth: #6BBF8A;
  --accent-milestone: #E8C84A;
  --accent-health: #E07070;
  --accent-activity: #5BBFB5;
  --accent-primary: #7BA68C;
  --accent-primary-hover: #6B9A7C;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-height: 72px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1A1A1E;
    --bg-secondary: #242428;
    --bg-card: #2A2A2E;
    --bg-input: #323236;
    --text-primary: #ECECEC;
    --text-secondary: #A0A0A0;
    --text-muted: #707070;
    --border: #3A3A3E;
    --border-focus: #7BA68C;
    --shadow: 0 2px 12px rgba(0,0,0,0.2);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.3);
    --accent-primary: #8BBF9C;
    --accent-primary-hover: #7AAF8C;
  }
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; height:100%; }
body {
  font-family:'Nunito',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  min-height:100%;
  overflow-x:hidden;
  padding-top:env(safe-area-inset-top);
}
.app {
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  padding-bottom:calc(var(--nav-height) + 24px);
}

/* Header */
.header {
  padding:14px 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg-primary);
}
.h-left { display:flex; align-items:center; gap:10px; }
.avatar {
  width:42px; height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent-primary),var(--accent-sleep));
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  box-shadow:0 2px 8px rgba(123,166,140,0.3);
  color:white; font-weight:800; font-family:'Quicksand',sans-serif;
}
.h-name { font-family:'Quicksand',sans-serif; font-weight:700; font-size:1.15rem; }
.h-age { font-size:0.72rem; color:var(--text-muted); font-weight:600; }
.h-actions { display:flex; gap:6px; }
.ibtn {
  width:38px; height:38px;
  border-radius:50%;
  border:none;
  background:var(--bg-card);
  color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.ibtn:active { transform:scale(0.9); }

/* Sync bar */
.sync-bar {
  padding:5px 16px;
  font-size:0.65rem;
  font-weight:700;
  text-align:center;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.sdot { width:6px; height:6px; border-radius:50%; }
.sdot.ok { background:#6BBF8A; }
.sdot.local { background:var(--accent-milestone); }
.sdot.err { background:var(--accent-health); }
.sdot.sync { background:var(--accent-sleep); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Bottom Nav */
.bnav {
  position:fixed;
  bottom:0;
  left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  height:var(--nav-height);
  background:var(--bg-secondary);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:0 6px;
  padding-bottom:env(safe-area-inset-bottom,6px);
  z-index:200;
}
.nitem {
  display:flex; flex-direction:column; align-items:center; gap:1px;
  padding:6px 10px;
  border:none; background:none;
  color:var(--text-muted);
  font-size:20px;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
}
.nitem span { font-size:0.58rem; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; }
.nitem.act { color:var(--accent-primary); }
.nadd {
  width:52px; height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent-primary),#6BBFA0);
  color:white; font-size:26px;
  border:none; cursor:pointer;
  box-shadow:0 4px 14px rgba(123,166,140,0.4);
  display:flex; align-items:center; justify-content:center;
  transform:translateY(-10px);
}
.nadd:active { transform:translateY(-10px) scale(0.9); }

/* Section titles */
.stitle {
  font-family:'Quicksand',sans-serif;
  font-weight:700; font-size:0.75rem;
  text-transform:uppercase; letter-spacing:0.8px;
  color:var(--text-muted);
  padding:14px 16px 6px;
}

/* Cards */
.card {
  background:var(--bg-card);
  border-radius:var(--radius);
  margin:5px 14px;
  padding:12px 14px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

/* Stats grid */
.sgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:0 14px; margin-bottom:10px; }
.scard {
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:14px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  text-align:center;
}
.sval { font-family:'Quicksand',sans-serif; font-size:1.6rem; font-weight:800; }
.slab { font-size:0.65rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin-top:2px; }

/* Summary chips */
.chips { display:flex; gap:6px; padding:4px 14px 8px; overflow-x:auto; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0;
  padding:6px 12px;
  border-radius:18px;
  font-size:0.72rem;
  font-weight:700;
  display:flex; align-items:center; gap:5px;
  border:1px solid var(--border);
  background:var(--bg-card);
  white-space:nowrap;
}

/* Entry row */
.erow { display:flex; align-items:center; gap:10px; }
.eicon {
  width:38px; height:38px;
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0;
}
.einfo { flex:1; min-width:0; }
.etitle { font-weight:700; font-size:0.85rem; }
.esub { font-size:0.72rem; color:var(--text-secondary); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.etime { text-align:right; flex-shrink:0; }
.etime-m { font-size:0.75rem; font-weight:700; }
.etime-r { font-size:0.62rem; color:var(--text-muted); }
.edel {
  width:26px; height:26px;
  border:none; background:none;
  color:var(--text-muted);
  cursor:pointer; font-size:12px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  opacity:0.4; flex-shrink:0;
}
.edel:active { opacity:1; color:var(--accent-health); }

/* Modal */
.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.45);
  z-index:500;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  animation:fadeIn 0.15s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.sheet {
  background:var(--bg-secondary);
  border-radius:22px 22px 0 0;
  width:100%; max-width:480px;
  max-height:88vh;
  overflow-y:auto;
  padding:6px 18px 28px;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:8px auto 14px; }
.mtitle { font-family:'Quicksand',sans-serif; font-weight:800; font-size:1.2rem; text-align:center; margin-bottom:16px; }

/* Form */
.tgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px; }
.tbtn {
  padding:12px;
  border-radius:var(--radius-sm);
  border:2px solid var(--border);
  background:var(--bg-card);
  cursor:pointer;
  display:flex; align-items:center; gap:8px;
  font-family:'Nunito',sans-serif;
  font-size:0.8rem; font-weight:600;
  color:var(--text-primary);
}
.tbtn.sel { border-color:var(--accent-primary); background:rgba(123,166,140,0.08); }
.tbtn:active { transform:scale(0.96); }
.tbtn .ti { font-size:1.2rem; }

.fgroup { margin-bottom:12px; }
.flabel { font-size:0.7rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:5px; display:block; }
.finput {
  width:100%; padding:11px 12px;
  border-radius:var(--radius-sm);
  border:2px solid var(--border);
  background:var(--bg-input);
  color:var(--text-primary);
  font-family:'Nunito',sans-serif;
  font-size:0.95rem; font-weight:600;
  outline:none;
}
.finput:focus { border-color:var(--border-focus); }
textarea.finput { resize:vertical; min-height:50px; }

.btn1 {
  width:100%; padding:14px;
  border-radius:var(--radius);
  border:none;
  background:linear-gradient(135deg,var(--accent-primary),#6BBFA0);
  color:white;
  font-family:'Nunito',sans-serif;
  font-size:0.95rem; font-weight:800;
  cursor:pointer; margin-top:8px;
  box-shadow:0 4px 14px rgba(123,166,140,0.3);
}
.btn1:active { transform:scale(0.97); }
.btn1:disabled { opacity:0.5; }
.btn2 {
  width:100%; padding:12px;
  border-radius:var(--radius);
  border:2px solid var(--border);
  background:var(--bg-card);
  color:var(--text-primary);
  font-family:'Nunito',sans-serif;
  font-size:0.85rem; font-weight:700;
  cursor:pointer; margin-top:8px;
}
.btn-danger {
  width:100%; padding:12px;
  border-radius:var(--radius);
  border:2px solid var(--accent-health);
  background:transparent;
  color:var(--accent-health);
  font-family:'Nunito',sans-serif;
  font-size:0.85rem; font-weight:700;
  cursor:pointer; margin-top:8px;
}

/* Timer */
.timer-box { text-align:center; padding:16px; margin:10px 0; background:var(--bg-input); border-radius:var(--radius); }
.timer-val { font-family:'Quicksand',sans-serif; font-size:2.8rem; font-weight:800; color:var(--accent-primary); letter-spacing:2px; }
.timer-lab { font-size:0.7rem; color:var(--text-muted); font-weight:600; margin-top:3px; }
.timer-ctrls { display:flex; gap:8px; margin-top:10px; }
.tbtn2 {
  flex:1; padding:12px;
  border-radius:var(--radius-sm);
  border:none;
  font-family:'Nunito',sans-serif;
  font-size:0.85rem; font-weight:700;
  cursor:pointer;
}
.tbtn2.start { background:var(--accent-primary); color:white; }
.tbtn2.stop { background:var(--accent-health); color:white; }
.tbtn2.reset { background:var(--bg-input); color:var(--text-secondary); border:2px solid var(--border); }

/* Cat tabs */
.ctabs { display:flex; gap:5px; padding:0 14px; overflow-x:auto; scrollbar-width:none; margin-bottom:8px; }
.ctabs::-webkit-scrollbar { display:none; }
.ctab {
  flex-shrink:0; padding:6px 12px;
  border-radius:18px;
  border:2px solid var(--border);
  background:var(--bg-card);
  font-family:'Nunito',sans-serif;
  font-size:0.7rem; font-weight:700;
  cursor:pointer;
  display:flex; align-items:center; gap:3px;
  color:var(--text-secondary);
  white-space:nowrap;
}
.ctab.act { border-color:var(--accent-primary); color:var(--accent-primary); background:rgba(123,166,140,0.08); }

/* Day separator */
.daysep { padding:10px 16px 3px; font-size:0.7rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.4px; }

/* Empty */
.empty { text-align:center; padding:36px 18px; color:var(--text-muted); }
.empty .ei { font-size:2.5rem; margin-bottom:10px; }
.empty .et { font-size:0.85rem; font-weight:600; }

/* Setup */
.setup {
  padding:36px 20px;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; justify-content:center;
}
.setup-logo { font-size:3.5rem; margin-bottom:14px; }
.setup-title { font-family:'Quicksand',sans-serif; font-weight:800; font-size:1.6rem; text-align:center; margin-bottom:3px; }
.setup-sub { color:var(--text-secondary); text-align:center; margin-bottom:28px; font-size:0.85rem; line-height:1.5; max-width:320px; }
.setup-form { width:100%; max-width:340px; }
.step { margin-bottom:20px; }
.step-num {
  display:inline-flex; width:26px; height:26px;
  border-radius:50%;
  background:var(--accent-primary);
  color:white; font-size:0.75rem; font-weight:800;
  align-items:center; justify-content:center;
  margin-right:6px;
}
.step-title { font-weight:700; font-size:0.9rem; margin-bottom:8px; }
.step-help { font-size:0.68rem; color:var(--text-muted); margin-top:5px; line-height:1.5; }
.step-help a { color:var(--accent-primary); }

/* Config sections */
.csec { margin:10px 14px; padding:14px; background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--border); }
.csec-title { font-weight:700; font-size:0.85rem; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.csec-val { font-size:0.75rem; color:var(--text-secondary); word-break:break-all; background:var(--bg-input); padding:7px 10px; border-radius:6px; margin-bottom:7px; }

/* Diaper breakdown */
.dbreak { display:flex; justify-content:space-around; text-align:center; }
.dbreak-item .di { font-size:1.3rem; }
.dbreak-item .dv { font-weight:800; font-size:1.1rem; }
.dbreak-item .dl { font-size:0.65rem; color:var(--text-muted); }

/* Bar chart */
.bars { display:flex; align-items:flex-end; justify-content:space-around; height:90px; padding-top:10px; }
.bar-col { text-align:center; flex:1; }
.bar-rect { width:20px; border-radius:5px; margin:0 auto 3px; transition:height 0.3s; }
.bar-lbl { font-size:0.62rem; font-weight:700; color:var(--text-muted); }
.bar-val { font-size:0.62rem; font-weight:800; }

/* Status message */
.status-msg {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  background:var(--bg-card); color:var(--text-primary);
  padding:10px 20px; border-radius:20px;
  box-shadow:var(--shadow-lg);
  font-size:0.8rem; font-weight:700;
  z-index:600;
  animation:fadeIn 0.2s ease;
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════════
// BebéTracker — Standalone App with Google Sheets Sync
// ════════════════════════════════════════════════════════════════

const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem('bt_'+k)); } catch { return null; } },
  set(k,v) { localStorage.setItem('bt_'+k, JSON.stringify(v)); },
  del(k) { localStorage.removeItem('bt_'+k); }
};

const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const CATS = {
  feeding: { icon:'🍼', label:'Alimentación', color:'var(--accent-feeding)',
    subs:[{id:'breast_left',label:'Pecho Izq.',icon:'🤱'},{id:'breast_right',label:'Pecho Der.',icon:'🤱'},{id:'bottle',label:'Biberón',icon:'🍼'},{id:'solids',label:'Sólidos',icon:'🥣'}]},
  diaper: { icon:'🧷', label:'Pañal', color:'var(--accent-diaper)',
    subs:[{id:'wet',label:'Pipí',icon:'💧'},{id:'dirty',label:'Popó',icon:'💩'},{id:'mixed',label:'Ambos',icon:'💧💩'},{id:'dry',label:'Seco',icon:'✨'}]},
  pumping: { icon:'🫙', label:'Extracción', color:'var(--accent-pumping)',
    subs:[{id:'pump_left',label:'Izquierdo',icon:'⬅️'},{id:'pump_right',label:'Derecho',icon:'➡️'},{id:'pump_both',label:'Ambos',icon:'↔️'}]},
  sleep: { icon:'😴', label:'Sueño', color:'var(--accent-sleep)',
    subs:[{id:'nap',label:'Siesta',icon:'💤'},{id:'night',label:'Noche',icon:'🌙'}]},
  growth: { icon:'📏', label:'Crecimiento', color:'var(--accent-growth)',
    subs:[{id:'weight',label:'Peso (kg)',icon:'⚖️'},{id:'height',label:'Talla (cm)',icon:'📏'},{id:'head',label:'Cabeza (cm)',icon:'🟠'}]},
  milestone: { icon:'⭐', label:'Hitos', color:'var(--accent-milestone)', subs:[]},
  health: { icon:'🌡️', label:'Salud', color:'var(--accent-health)',
    subs:[{id:'temperature',label:'Temperatura',icon:'🌡️'},{id:'medication',label:'Medicamento',icon:'💊'},{id:'symptom',label:'Síntoma',icon:'🤒'}]},
  activity: { icon:'🎯', label:'Actividades', color:'var(--accent-activity)',
    subs:[{id:'tummy_time',label:'Boca abajo',icon:'👶'},{id:'bath',label:'Baño',icon:'🛁'},{id:'play',label:'Juego',icon:'🧸'}]}
};

// ── Time utils ──
const fmtTime = d => new Date(d).toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',hour12:true});
const fmtDate = d => new Date(d).toLocaleDateString('es-CR',{weekday:'short',day:'numeric',month:'short'});
const fmtDur = m => { if(!m&&m!==0)return''; const h=Math.floor(m/60),mn=Math.round(m%60); return h>0?`${h}h ${mn}m`:`${mn}m`; };
const fmtRel = d => {
  const diff=Date.now()-new Date(d).getTime(), mins=Math.floor(diff/60000);
  if(mins<1)return'justo ahora'; if(mins<60)return`hace ${mins}m`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`hace ${hrs}h ${mins%60}m`;
  return fmtDate(d)+' '+fmtTime(d);
};
const fmtTimer = s => { const m=Math.floor(s/60).toString().padStart(2,'0'), ss=(s%60).toString().padStart(2,'0'); return m+':'+ss; };
const babyAge = bd => {
  if(!bd)return'';
  const days=Math.floor((Date.now()-new Date(bd).getTime())/86400000);
  if(days<7)return days+' día'+(days!==1?'s':'');
  if(days<30){ const w=Math.floor(days/7); return w+' semana'+(w!==1?'s':''); }
  const mo=Math.floor(days/30.44);
  if(mo<12)return mo+' mes'+(mo!==1?'es':'');
  const y=Math.floor(mo/12),rm=mo%12;
  return y+' año'+(y!==1?'s':'')+(rm>0?` ${rm}m`:'');
};

// ── Google Sheets API ──
const GS = {
  apiKey: null,
  sheetId: null,
  configured() { return this.apiKey && this.sheetId; },
  load() {
    const c = LS.get('sheets_config');
    if(c){ this.apiKey=c.apiKey; this.sheetId=c.sheetId; }
  },
  save() { LS.set('sheets_config',{apiKey:this.apiKey,sheetId:this.sheetId}); },

  async initSheet() {
    // Check if our sheet "Registros" exists, if not create it
    try {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${this.sheetId}?key=${this.apiKey}`);
      const data = await r.json();
      if(data.error) throw new Error(data.error.message);
      const hasSheet = data.sheets.some(s=>s.properties.title==='Registros');
      if(!hasSheet) {
        // We need OAuth for write — but API Key is read-only for private sheets
        // Actually, for this to work we need the sheet to be "Anyone with link can edit"
        // Let's add headers
        await this.appendRows([['id','category','subtype','timestamp','duration','amount','unit','value','notes','created_by']]);
      }
      return true;
    } catch(e) {
      console.error('Sheet init error:',e);
      return false;
    }
  },

  async readAll() {
    if(!this.configured()) return null;
    try {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${this.sheetId}/values/Registros!A:J?key=${this.apiKey}`);
      const data = await r.json();
      if(data.error) throw new Error(data.error.message);
      if(!data.values || data.values.length<=1) return [];
      const headers = data.values[0];
      return data.values.slice(1).map(row => {
        const obj = {};
        headers.forEach((h,i) => obj[h]=row[i]||'');
        if(obj.duration) obj.duration=parseFloat(obj.duration);
        return obj;
      });
    } catch(e) {
      console.error('Read error:',e);
      return null;
    }
  },

  async appendRows(rows) {
    if(!this.configured()) return false;
    try {
      const r = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${this.sheetId}/values/Registros!A:J:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS&key=${this.apiKey}`,
        {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({values:rows})
        }
      );
      const data = await r.json();
      if(data.error) throw new Error(data.error.message);
      return true;
    } catch(e) {
      console.error('Append error:',e);
      return false;
    }
  },

  async deleteRow(entryId) {
    // With API key we can't delete rows directly
    // We'll mark deleted entries locally and filter them out
    return false;
  }
};

// ── App State ──
let state = {
  baby: null,      // {name, birthDate}
  entries: [],     // local entries
  tab: 'home',
  modal: null,     // null | 'add' | 'entry' | 'settings' | 'setup' | 'sheets-setup'
  addCat: null,
  filterCat: 'all',
  syncStatus: 'local',
  lastSync: null,
  timerRunning: false,
  timerStart: null,
  timerElapsed: 0,
  deleted: [],     // deleted entry IDs (to filter from sheets)
  statusMsg: null,
  caregiver: ''    // name of who's logging
};

let timerInterval = null;

function init() {
  GS.load();
  state.baby = LS.get('baby');
  state.entries = LS.get('entries') || [];
  state.deleted = LS.get('deleted') || [];
  state.caregiver = LS.get('caregiver') || '';
  if(!state.baby) state.modal='setup';
  else if(GS.configured()) {
    state.syncStatus='ok';
    syncFromSheets();
  }
  render();
}

function showStatus(msg) {
  state.statusMsg = msg;
  render();
  setTimeout(()=>{ state.statusMsg=null; render(); }, 2500);
}

// ── Sync logic ──
async function syncFromSheets() {
  if(!GS.configured()) return;
  state.syncStatus='sync';
  render();
  const remote = await GS.readAll();
  if(remote===null) {
    state.syncStatus='err';
    render();
    return;
  }
  // Merge: remote + local (not yet pushed)
  const remoteIds = new Set(remote.map(e=>e.id));
  const localOnly = state.entries.filter(e=>!remoteIds.has(e.id) && !e._synced);
  // Push local-only to sheets
  if(localOnly.length>0) {
    const rows = localOnly.map(e=>[e.id,e.category,e.subtype||'',e.timestamp,e.duration||'',e.amount||'',e.unit||'',e.value||'',e.notes||'',e.created_by||state.caregiver]);
    const ok = await GS.appendRows(rows);
    if(ok) localOnly.forEach(e=>e._synced=true);
  }
  // Merge all
  const all = [...remote.filter(e=>!state.deleted.includes(e.id)), ...localOnly];
  all.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  state.entries = all;
  LS.set('entries', state.entries);
  state.syncStatus='ok';
  state.lastSync=new Date();
  render();
}

async function pushEntry(entry) {
  if(GS.configured()) {
    const row = [entry.id,entry.category,entry.subtype||'',entry.timestamp,entry.duration||'',entry.amount||'',entry.unit||'',entry.value||'',entry.notes||'',entry.created_by||state.caregiver];
    const ok = await GS.appendRows([row]);
    if(ok) entry._synced=true;
  }
}

function addEntry(entry) {
  entry.id = uid();
  entry.timestamp = entry.timestamp || new Date().toISOString();
  entry.created_by = state.caregiver;
  state.entries.unshift(entry);
  LS.set('entries', state.entries);
  pushEntry(entry);
  state.modal=null; state.addCat=null;
  showStatus('✓ Registro guardado');
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e=>e.id!==id);
  state.deleted.push(id);
  LS.set('entries', state.entries);
  LS.set('deleted', state.deleted);
  render();
}

// ── Auto sync every 45 seconds ──
setInterval(()=>{ if(GS.configured()) syncFromSheets(); }, 45000);

// ── Timer ──
function startTimer() {
  state.timerRunning=true;
  state.timerStart=Date.now();
  state.timerElapsed=0;
  timerInterval=setInterval(()=>{
    state.timerElapsed=Math.floor((Date.now()-state.timerStart)/1000);
    // Update timer display only
    const el=document.getElementById('timer-val');
    if(el) el.textContent=fmtTimer(state.timerElapsed);
  },1000);
}
function pauseTimer() {
  state.timerRunning=false;
  clearInterval(timerInterval);
}
function resetTimer() {
  state.timerRunning=false;
  clearInterval(timerInterval);
  state.timerStart=null;
  state.timerElapsed=0;
  render();
}
function resumeTimer() {
  state.timerRunning=true;
  state.timerStart=Date.now()-state.timerElapsed*1000;
  timerInterval=setInterval(()=>{
    state.timerElapsed=Math.floor((Date.now()-state.timerStart)/1000);
    const el=document.getElementById('timer-val');
    if(el) el.textContent=fmtTimer(state.timerElapsed);
  },1000);
}

function h(tag,attrs,...children) {
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='onclick'||k==='onchange'||k==='oninput') el[k]=v;
    else if(k==='className') el.className=v;
    else if(k==='htmlFor') el.htmlFor=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'? document.createTextNode(c): c);
  });
  return el;
}

function render() {
  const app=document.getElementById('app');
  app.innerHTML='';

  // Status msg
  if(state.statusMsg) {
    app.appendChild(h('div',{className:'status-msg'},state.statusMsg));
  }

  // Setup
  if(state.modal==='setup') { app.appendChild(renderSetup()); return; }
  if(state.modal==='sheets-setup') { app.appendChild(renderSheetsSetup()); return; }

  const container = h('div',{className:'app'});

  // Header
  container.appendChild(renderHeader());

  // Sync bar
  const syncText = state.syncStatus==='ok'?'Sincronizado con Google Sheets':
    state.syncStatus==='sync'?'Sincronizando...':
    state.syncStatus==='err'?'Error de sincronización':
    GS.configured()?'Conectado':'Modo local · Configurar Google Sheets en ⚙️';
  container.appendChild(h('div',{className:'sync-bar'},
    h('span',{className:'sdot '+(state.syncStatus==='ok'?'ok':state.syncStatus==='err'?'err':state.syncStatus==='sync'?'sync':'local')}),
    syncText,
    state.lastSync?' · '+fmtTime(state.lastSync):''
  ));

  // Tab content
  if(state.tab==='home') container.appendChild(renderHome());
  if(state.tab==='history') container.appendChild(renderHistory());
  if(state.tab==='stats') container.appendChild(renderStats());

  // Bottom nav
  container.appendChild(renderNav());

  app.appendChild(container);

  // Modals
  if(state.modal==='add') app.appendChild(renderAddModal());
  if(state.modal==='entry') app.appendChild(renderEntryModal());
  if(state.modal==='settings') app.appendChild(renderSettings());
}

}

function renderHome() {

  const tPump=today.filter(e=>e.category==='pumping');
  const tPumpMl=tPump.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);

  box.appendChild(h('div',{className:'stitle'},'Resumen de hoy'));
  const grid=h('div',{className:'sgrid'});
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-feeding)'}},String(tFeed)),h('div',{className:'slab'},'Alimentaciones')));
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-diaper)'}},String(tDiap)),h('div',{className:'slab'},'Pañales')));
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-sleep)'}},fmtDur(tSleep)||'0m'),h('div',{className:'slab'},'Sueño')));
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-pumping)'}},tPumpMl>0?tPumpMl+'ml':String(tPump.length)),h('div',{className:'slab'},'Extracción')));

  const lastDiap=today.find(e=>e.category==='diaper');
  if(lastFeed) chips.appendChild(h('div',{className:'chip'},'🍼 Última: '+fmtRel(lastFeed.timestamp)));
  if(lastDiap) chips.appendChild(h('div',{className:'chip'},'🧷 Último: '+fmtRel(lastDiap.timestamp)));
  if(chips.children.length) box.appendChild(chips);

  // Recent

    box.appendChild(h('div',{className:'empty'},h('div',{className:'ei'},'👶'),h('div',{className:'et'},'¡Empieza a registrar las actividades de '+(state.baby?.name||'tu bebé')+'!')));
  } else {
    recent.forEach(e=>box.appendChild(renderEntryCard(e)));

  return box;
}

function renderEntryCard(entry) {
  const cat=CATS[entry.category]||{icon:'📝',label:entry.category,color:'var(--text-muted)',subs:[]};
  const sub=cat.subs.find(s=>s.id===entry.subtype);
  const icon=sub?sub.icon:cat.icon;
  const label=sub?sub.label:cat.label;
  const parts=[];
  if(entry.duration) parts.push(fmtDur(entry.duration));
  if(entry.amount) parts.push(entry.amount+(entry.unit?' '+entry.unit:''));
  if(entry.value) parts.push(entry.value+(entry.unit||''));
  if(entry.notes) parts.push(entry.notes);
  if(entry.created_by) parts.push('por '+entry.created_by);
  const detail=parts.join(' · ');

  return h('div',{className:'card'},
    h('div',{className:'erow'},
      h('div',{className:'eicon',style:{background:cat.color.replace(')',',0.13)').replace('var(','rgba(123,166,140,')}},icon),
      h('div',{className:'einfo'},
        h('div',{className:'etitle'},label),
        h('div',{className:'esub'},detail)
      ),
      h('div',{className:'etime'},
        h('div',{className:'etime-m'},fmtTime(entry.timestamp)),
        h('div',{className:'etime-r'},fmtRel(entry.timestamp))
      ),
      h('button',{className:'edel',onclick:(ev)=>{ ev.stopPropagation(); if(confirm('¿Eliminar este registro?')) deleteEntry(entry.id); }},'✕')
    )
  );
}

function renderHistory() {
  const box=h('div',{className:'content-scroll'});
  box.appendChild(h('div',{className:'stitle'},'Historial'));

  // Tabs
  const tabs=h('div',{className:'ctabs'});
  tabs.appendChild(h('button',{className:'ctab'+(state.filterCat==='all'?' act':''),onclick:()=>{ state.filterCat='all'; render(); }},'📋 Todo'));
  Object.entries(CATS).forEach(([k,c])=>{
    tabs.appendChild(h('button',{className:'ctab'+(state.filterCat===k?' act':''),onclick:()=>{ state.filterCat=k; render(); }},c.icon+' '+c.label));
  });
  box.appendChild(tabs);

  const filtered=state.filterCat==='all'?state.entries:state.entries.filter(e=>e.category===state.filterCat);
  const grouped={};
  filtered.forEach(e=>{ const d=new Date(e.timestamp).toDateString(); if(!grouped[d])grouped[d]=[]; grouped[d].push(e); });
  const days=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));
  const todayStr=new Date().toDateString();
  const yestStr=new Date(Date.now()-86400000).toDateString();

  if(days.length===0) {
    box.appendChild(h('div',{className:'empty'},h('div',{className:'ei'},'📋'),h('div',{className:'et'},'No hay registros')));
  } else {
    days.forEach(d=>{
      const label=d===todayStr?'Hoy':d===yestStr?'Ayer':fmtDate(d);
      box.appendChild(h('div',{className:'daysep'},label));
      grouped[d].forEach(e=>box.appendChild(renderEntryCard(e)));
    });
  }
  return box;
}

function renderStats() {
  const box=h('div',{className:'content-scroll'});
  const now=Date.now(), d7=now-7*86400000;
  const last7=state.entries.filter(e=>new Date(e.timestamp).getTime()>=d7);

  box.appendChild(h('div',{className:'stitle'},'Últimos 7 días'));

  const grid=h('div',{className:'sgrid'});
  const f7=last7.filter(e=>e.category==='feeding').length;
  const d7c=last7.filter(e=>e.category==='diaper').length;
  const sleepByDay={};
  last7.filter(e=>e.category==='sleep').forEach(e=>{ const d=new Date(e.timestamp).toDateString(); sleepByDay[d]=(sleepByDay[d]||0)+(e.duration||0); });
  const sleepDays=Object.keys(sleepByDay).length;
  const avgSleep=sleepDays>0?Object.values(sleepByDay).reduce((a,b)=>a+b,0)/sleepDays:0;
  const pumpTot=last7.filter(e=>e.category==='pumping').reduce((s,e)=>s+(parseFloat(e.amount)||0),0);

  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-feeding)'}},String(f7)),h('div',{className:'slab'},'Alimentaciones')));
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-diaper)'}},String(d7c)),h('div',{className:'slab'},'Pañales')));
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-sleep)'}},fmtDur(avgSleep)||'—'),h('div',{className:'slab'},'Sueño prom/día')));
  grid.appendChild(h('div',{className:'scard'},h('div',{className:'sval',style:{color:'var(--accent-pumping)'}},pumpTot>0?pumpTot+'ml':'—'),h('div',{className:'slab'},'Extracción total')));
  box.appendChild(grid);

  // Diaper breakdown
  const dt={wet:0,dirty:0,mixed:0,dry:0};
  last7.filter(e=>e.category==='diaper').forEach(e=>{ if(dt[e.subtype]!==undefined)dt[e.subtype]++; });
  box.appendChild(h('div',{className:'stitle'},'Pañales por tipo'));
  const dcard=h('div',{className:'card'},
    h('div',{className:'dbreak'},
      h('div',{className:'dbreak-item'},h('div',{className:'di'},'💧'),h('div',{className:'dv'},String(dt.wet)),h('div',{className:'dl'},'Pipí')),
      h('div',{className:'dbreak-item'},h('div',{className:'di'},'💩'),h('div',{className:'dv'},String(dt.dirty)),h('div',{className:'dl'},'Popó')),
      h('div',{className:'dbreak-item'},h('div',{className:'di'},'💧💩'),h('div',{className:'dv'},String(dt.mixed)),h('div',{className:'dl'},'Ambos')),
      h('div',{className:'dbreak-item'},h('div',{className:'di'},'✨'),h('div',{className:'dv'},String(dt.dry)),h('div',{className:'dl'},'Seco'))
    )
  );
  box.appendChild(dcard);

  // Feeding chart
  const feedByDay={};
  last7.filter(e=>e.category==='feeding').forEach(e=>{
    const d=new Date(e.timestamp).toLocaleDateString('es-CR',{weekday:'short'});
    feedByDay[d]=(feedByDay[d]||0)+1;
  });
  if(Object.keys(feedByDay).length>0) {
    box.appendChild(h('div',{className:'stitle'},'Alimentaciones por día'));
    const maxVal=Math.max(...Object.values(feedByDay));
    const bars=h('div',{className:'card'},h('div',{className:'bars'},
      ...Object.entries(feedByDay).map(([d,c])=>
        h('div',{className:'bar-col'},
          h('div',{className:'bar-rect',style:{height:Math.max(8,(c/maxVal)*65)+'px',background:'var(--accent-feeding)'}}),
          h('div',{className:'bar-lbl'},d),
          h('div',{className:'bar-val'},String(c))
        )
      )
    ));
    box.appendChild(bars);
  }

  if(state.entries.length===0) {
    box.appendChild(h('div',{className:'empty'},h('div',{className:'ei'},'📊'),h('div',{className:'et'},'Agrega registros para ver estadísticas')));
  }
  return box;
}

      h('div',{className:'timer-box'},
        h('div',{className:'timer-val',id:'timer-val'},fmtTimer(state.timerElapsed)),
        h('div',{className:'timer-lab'},state.timerRunning?'Cronómetro corriendo':state.timerElapsed>0?'Pausado':'Toca iniciar o ingresa minutos')
      ),
      h('div',{className:'timer-ctrls'},
        state.timerRunning?
          h('button',{className:'tbtn2 stop',onclick:()=>{ pauseTimer(); render(); }},'⏸ Pausar'):
          h('button',{className:'tbtn2 start',onclick:()=>{ state.timerElapsed>0?resumeTimer():startTimer(); render(); }},'▶ Iniciar'),

      ),

    ));
  }

  // Amount (feeding, pumping)
  const needsAmt=['pumping','feeding'].includes(state.addCat);
  if(needsAmt) {
    box.appendChild(h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'Cantidad'),
      h('div',{style:{display:'flex',gap:'8px'}},
        h('input',{className:'finput',type:'number',placeholder:'Cantidad',id:'amount',style:{flex:'1'}}),
        h('select',{className:'finput',id:'unit',style:{width:'75px'}},
          h('option',{value:'ml'},'ml'),
          h('option',{value:'oz'},'oz')
        )
      )

  // Value (growth, health)
  const needsVal=state.addCat==='growth'||state.addCat==='health';
  if(needsVal) {

      h('label',{className:'flabel'},'Valor'),
      h('input',{className:'finput',type:'number',step:'0.1',placeholder:'Valor',id:'entry-value'})
    ));
  }

  // Milestone text
  if(state.addCat==='milestone') {
    box.appendChild(h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'¿Qué hito logró?'),
      h('input',{className:'finput',placeholder:'Ej: Primera sonrisa...',id:'entry-notes'})
    ));
  }

  // Timestamp
  const now=new Date();
  const localISO=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  box.appendChild(h('div',{className:'fgroup'},
    h('label',{className:'flabel'},'Fecha y hora'),
    h('input',{className:'finput',type:'datetime-local',id:'entry-ts',value:localISO})
  ));

  // Notes
  if(state.addCat!=='milestone') {
    box.appendChild(h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'Notas (opcional)'),
      h('textarea',{className:'finput',placeholder:'Observaciones...',id:'entry-notes'})
    ));
  }

  // Save
  box.appendChild(h('button',{className:'btn1',onclick:()=>{
    const selSub=document.querySelector('#sub-grid .tbtn.sel');
    const entry={
      category:state.addCat,
      subtype:selSub?selSub.dataset.sub:(cat.subs[0]?.id||''),
      timestamp:document.getElementById('entry-ts')?.value?new Date(document.getElementById('entry-ts').value).toISOString():new Date().toISOString(),
      notes:document.getElementById('entry-notes')?.value||''
    };
    if(needsDur) {
      if(state.timerRunning||state.timerElapsed>0) {
        entry.duration=Math.round(state.timerElapsed/60);
        pauseTimer(); resetTimer();
      } else {
        entry.duration=parseFloat(document.getElementById('manual-dur')?.value)||0;
      }
    }
    if(needsAmt) {
      entry.amount=document.getElementById('amount')?.value||'';
      entry.unit=document.getElementById('unit')?.value||'ml';
    }
    if(needsVal) {
      entry.value=document.getElementById('entry-value')?.value||'';
      const sub=selSub?selSub.dataset.sub:'';
      entry.unit=sub==='weight'?'kg':sub==='temperature'?'°C':'cm';
    }
    addEntry(entry);
  }},'Guardar registro'));

  box.appendChild(h('button',{className:'btn2',onclick:()=>{ state.modal=null; state.addCat=null; resetTimer(); render(); }},'Cancelar'));

  return box;
}

function renderSettings() {
  return h('div',{className:'overlay',onclick:e=>{ if(e.target===e.currentTarget){state.modal=null;render();} }},
    h('div',{className:'sheet'},
      h('div',{className:'handle'}),
      h('div',{className:'mtitle'},'⚙️ Ajustes'),

      h('div',{className:'csec'},
        h('div',{className:'csec-title'},'👶 Bebé'),
        h('div',{className:'csec-val'},state.baby?.name+' · Nació: '+state.baby?.birthDate),
        h('button',{className:'btn2',onclick:()=>{ state.modal='setup'; render(); }},'Cambiar datos del bebé')
      ),

      h('div',{className:'csec'},
        h('div',{className:'csec-title'},'👤 Cuidador'),
        h('div',{style:{fontSize:'0.78rem',color:'var(--text-secondary)',marginBottom:'8px'}},'Nombre que aparecerá en los registros'),
        h('input',{className:'finput',value:state.caregiver,placeholder:'Tu nombre',id:'caregiver-input',oninput:function(){ state.caregiver=this.value; LS.set('caregiver',this.value); }}),
      ),

      h('div',{className:'csec'},
        h('div',{className:'csec-title'},'📊 Google Sheets'),
        GS.configured()?
          h('div',null,
            h('div',{className:'csec-val'},'Sheet ID: '+GS.sheetId.slice(0,20)+'...'),
            h('div',{style:{fontSize:'0.72rem',color:'var(--accent-primary)',fontWeight:'700',marginBottom:'8px'}},'✓ Conectado'),
            h('button',{className:'btn2',onclick:()=>{ syncFromSheets(); state.modal=null; render(); }},'Sincronizar ahora'),
            h('button',{className:'btn2',onclick:()=>{ state.modal='sheets-setup'; render(); }},'Reconfigurar')
          ):
          h('div',null,
            h('div',{style:{fontSize:'0.78rem',color:'var(--text-secondary)',marginBottom:'8px',lineHeight:'1.5'}},'Conecta Google Sheets para sincronizar datos entre dispositivos.'),
            h('button',{className:'btn1',onclick:()=>{ state.modal='sheets-setup'; render(); }},'Configurar Google Sheets')
          )
      ),

      h('div',{className:'csec'},
        h('div',{className:'csec-title'},'📦 Datos'),
        h('div',{className:'csec-val'},state.entries.length+' registros guardados'),
        h('button',{className:'btn2',onclick:()=>{
          const data=JSON.stringify({baby:state.baby,entries:state.entries},null,2);
          const blob=new Blob([data],{type:'application/json'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url; a.download='bebetracker-'+state.baby?.name+'-'+new Date().toISOString().slice(0,10)+'.json';
          a.click(); URL.revokeObjectURL(url);
        }},'Exportar datos (JSON)'),
        h('button',{className:'btn-danger',onclick:()=>{
          if(confirm('¿Estás seguro? Se borrarán todos los registros locales.')){
            state.entries=[]; state.deleted=[];
            LS.set('entries',[]); LS.set('deleted',[]);
            render();
          }
        }},'Borrar todos los datos')
      ),

      h('button',{className:'btn1',onclick:()=>{ state.modal=null; render(); },style:{margin:'14px 0'}},'Cerrar')
    )
  );
}

function renderSetup() {
  const box=h('div',{className:'setup'});
  box.appendChild(h('div',{className:'setup-logo'},'🌸'));
  box.appendChild(h('div',{className:'setup-title'},'BebéTracker'));
  box.appendChild(h('div',{className:'setup-sub'},'Registra alimentación, pañales, sueño y más. Comparte los datos con tu pareja en tiempo real.'));

  const form=h('div',{className:'setup-form'});

  form.appendChild(h('div',{className:'step'},
    h('div',{className:'step-title'},h('span',{className:'step-num'},'1'),' Datos del bebé'),
    h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'Nombre'),
      h('input',{className:'finput',id:'setup-name',value:state.baby?.name||'Teresa',placeholder:'Nombre del bebé'})
    ),
    h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'Fecha de nacimiento'),
      h('input',{className:'finput',type:'date',id:'setup-birth',value:state.baby?.birthDate||'2025-02-05'})
    )
  ));

  form.appendChild(h('div',{className:'step'},
    h('div',{className:'step-title'},h('span',{className:'step-num'},'2'),' Tu nombre'),
    h('div',{className:'fgroup'},
      h('input',{className:'finput',id:'setup-caregiver',value:state.caregiver||'',placeholder:'Tu nombre (ej: Adolfo, Mamá...)'})
    )
  ));

  form.appendChild(h('button',{className:'btn1',onclick:()=>{
    const name=document.getElementById('setup-name').value;
    const birth=document.getElementById('setup-birth').value;
    const cg=document.getElementById('setup-caregiver').value;
    if(!name||!birth){ alert('Por favor completa nombre y fecha.'); return; }
    state.baby={name,birthDate:birth};
    state.caregiver=cg;
    LS.set('baby',state.baby);
    LS.set('caregiver',cg);
    state.modal=null;
    render();
    if(!GS.configured()) {
      setTimeout(()=>{ state.modal='sheets-setup'; render(); },500);
    }
  }},'Empezar a registrar 🎉'));

  box.appendChild(form);
  return box;
}

function renderSheetsSetup() {
  const box=h('div',{className:'setup'});
  box.appendChild(h('div',{className:'setup-logo'},'📊'));
  box.appendChild(h('div',{className:'setup-title'},'Conectar Google Sheets'));
  box.appendChild(h('div',{className:'setup-sub'},'Esto permite que vos y tu pareja vean los mismos datos en tiempo real.'));

  const form=h('div',{className:'setup-form'});

  form.appendChild(h('div',{className:'step'},
    h('div',{className:'step-title'},h('span',{className:'step-num'},'1'),' Crear hoja de Google Sheets'),
    h('div',{className:'step-help'},
      '1. Ir a ',h('a',{href:'https://sheets.google.com',target:'_blank'},'sheets.google.com'),' y crear una hoja nueva.',
      h('br'),
      '2. Renombrar la primera pestaña (hoja) a: ',h('strong',null,'Registros'),
      h('br'),
      '3. En la fila 1, poner estos encabezados:',
      h('br'),
      h('strong',null,'id | category | subtype | timestamp | duration | amount | unit | value | notes | created_by'),
      h('br'),
      '(cada uno en una columna, A hasta J)',
      h('br'),
      '4. Compartir la hoja con tu pareja como "Editor".',
      h('br'),
      '5. Cambiar acceso general a "Cualquier persona con el enlace" → "Editor".'
    )
  ));

  form.appendChild(h('div',{className:'step'},
    h('div',{className:'step-title'},h('span',{className:'step-num'},'2'),' Obtener API Key de Google'),
    h('div',{className:'step-help'},
      '1. Ir a ',h('a',{href:'https://console.cloud.google.com',target:'_blank'},'console.cloud.google.com'),
      h('br'),
      '2. Crear proyecto nuevo (ej: "BebéTracker").',
      h('br'),
      '3. Ir a "APIs y servicios" → "Biblioteca" → buscar "Google Sheets API" → Habilitar.',
      h('br'),
      '4. Ir a "Credenciales" → "Crear credenciales" → "Clave de API".',
      h('br'),
      '5. Copiar la clave generada.'
    )
  ));

  form.appendChild(h('div',{className:'step'},
    h('div',{className:'step-title'},h('span',{className:'step-num'},'3'),' Pegar datos aquí'),
    h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'API Key de Google'),
      h('input',{className:'finput',id:'gs-apikey',value:GS.apiKey||'',placeholder:'AIzaSy...'})
    ),
    h('div',{className:'fgroup'},
      h('label',{className:'flabel'},'ID de la hoja de Google Sheets'),
      h('input',{className:'finput',id:'gs-sheetid',value:GS.sheetId||'',placeholder:'1BxiMVs0...(de la URL de la hoja)'}),
      h('div',{className:'step-help'},'El ID está en la URL de la hoja: docs.google.com/spreadsheets/d/',h('strong',null,'ESTE-ES-EL-ID'),'/edit')
    )
  ));

  form.appendChild(h('button',{className:'btn1',onclick:async()=>{
    const apiKey=document.getElementById('gs-apikey').value.trim();
    const sheetId=document.getElementById('gs-sheetid').value.trim();
    if(!apiKey||!sheetId){ alert('Por favor completa ambos campos.'); return; }
    GS.apiKey=apiKey;
    GS.sheetId=sheetId;
    GS.save();
    state.syncStatus='sync';
    state.modal=null;
    render();
    const ok = await syncFromSheets();
    if(state.syncStatus==='err'){
      showStatus('❌ Error de conexión. Verifica API Key y Sheet ID.');
    } else {
      showStatus('✓ ¡Conectado con Google Sheets!');
    }
  }},'Conectar y sincronizar'));

  form.appendChild(h('button',{className:'btn2',onclick:()=>{ state.modal=state.baby?null:'setup'; render(); }},'Ahora no · Usar modo local'));

  box.appendChild(form);
  return box;
}

// ── Init ──
init();
</script>
